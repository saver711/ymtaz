    <link rel="stylesheet" href="../sass/common.css" />

  </head>
  <body>
    <div class="body-content">
      <div class="body-content__inside">
        <!-- start navbar -->
        <div class="container-fluid navbar-container">

            <!-- دي هتظهر لو مش مسجل -->
            <div class="notRegistered">
                <a href="login.html" class="notRegistered__login main-btn">
                    <span>الدخول</span>
                    <span>الدخول</span>
                </a> / 
                <a href="signup.html" class="notRegistered__signup">التسجيل</a>
            </div>

            <!-- دي هتظهر لو مسجل -->
            <!-- <div class="registered">
              <a href="lawyer-account.html" class="registered__link">
                <div class="registered__img">
                  <img src="../assets/images/blank.webp" alt="user image" />
                </div>

                <h3 class="registered__name">يوسف بن الشيخ</h3>
              </a>


            </div> -->
          </nav>
        </div>
        <!-- end navbar -->
        <!-- start signup -->
        <div class="signup">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12 col-md-5">
                        <div class="signup__show">
                            <h2 class="signup__title">حساب جديد</h2>
                            <div class="signup__logo">
                                <img src="../assets/images/logo.webp" alt="">
                            </div>

                        </div>
                    </div>
    
                    <div class="col-12 col-md-7">
                        <form action="" class="log">
                            <div class="log__row log__row--1">
                                <div class="log__col">
                                    <label for="name">الاسم بالكامل</label>
                                    <input id="name" type="text" required autocomplete="name">
                                </div>
                            </div>
                            <div class="log__row log__row--2">
                                <div class="log__col">
                                    <label for="email">البريد الالكتروني</label>
                                    <input id="email" type="email" autocomplete="email" required>
                                </div>
            
                                <div class="log__col">
                                    <label for="pass">كلمة المرور</label>
                                    <input id="pass" type="password" required>
                                </div>
                            </div>
            
                            <div class="log__row log__row--2">
                                <div class="log__col">
                                    <label for="country-select">الدولة</label>
                                    <select required
                              class="list filterSelect"
                              data-target="select-family" id="country-select"
                            >
                              <option value="0" data-reference="0">الكل</option>
              
                              <option value="1" data-reference="1">مصر</option>
              
                              <option value="2" data-reference="2">السعودية</option>
              
                              <option value="3" data-reference="3">الكويت</option>
                            </select>
                                </div>
            
                                <div class="log__col">
                                    <label for="select-family">المدينة</label>
                                    <select class="list" id="select-family" required>
                                        <option value="0" data-belongsto="0">الكل</option>
                                        <option value="1" data-belongsto="1">القاهره</option>
                        
                                        <option value="2" data-belongsto="1">الاسكندرية</option>
                        
                                        <option value="3" data-belongsto="1">المنوفيه</option>
                        
                                        <option value="4" data-belongsto="2">الرياض</option>
                        
                                        <option value="5" data-belongsto="2">مكه</option>
                        
                                        <option value="6" data-belongsto="3">مدينه بالكويت</option>
                                      </select>
                                </div>
                            </div>
            
                            <div class="log__row log__row--2">
                                <div class="log__col">
                                    <label for="nationality">الجنسية</label>
                                <select name="" id="nationality" required>
                                    <option value="1">مصري</option>
                                </select>
                                </div>
            
                                <div class="log__col">
                                    <label for="gender">الجنس</label>
                                <select name="" id="gender" required>
                                    <option value="1">ذكر</option>
                                    <option value="2">أنثي</option>
                                </select>
                                </div>
                            </div>
            
                            <div class="log__row log__row--1">
                                <div class="log__col">
                                    <label>المهنة</label>
                                    <div class="log__field">
                                        <div class="log__box">
                                            <input type="checkbox" id="licenced-lawyer">
                                            <label for="licenced-lawyer">محام مرخص</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="mohakem">
                                            <label for="mohakem">محكم</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="maaazon-ankhoh">
                                            <label for="maaazon-ankhoh">مأذون أنكحة</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="moatheq">
                                            <label for="moatheq">موثق</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="nazer-waaf">
                                            <label for="nazer-waaf">ناظر وقف</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="mstshar-qanony">
                                            <label for="mstshar-qanony">مستشار قانوني</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="mtrgm-moatamad">
                                            <label for="mtrgm-moatamad">مترجم معتمد</label>
                                        </div>
            
                                        <div class="log__box">
                                            <input type="checkbox" id="hares-qdaey">
                                            <label for="hares-qdaey">حارس قضائي</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
            
                            <div class="log__row log__row--2">
                                <div class="log__col">
                                    <label for="degree">الدرجة العلمية</label>
                                    <select name="" id="degree" required>
                                        <option value="1">ماجستير</option>
                                    </select>
                                </div>
            
                                <div class="log__col">
                                    <label for="phone">رقم الهاتف</label>
                                    <input type="tel" name="" id="phone" autocomplete="tel" required>
                                </div>
                            </div>
            
                            <div class="log__row log__row--1">
                                <div class="log__col">
                                    <label for="miniAbout">نعريف مختصر</label>
                                    <input required type="text" id="miniAbout" placeholder="مثال: محامي بمحكمة النقض العالي">
                                </div>
                            </div>
            
                            <div class="log__row log__row--1">
                                <div class="log__col">
                                    <blockquote class="commitment">
                                        <q>
                                            اتعهد بصحة المعلومات في ملفي الشخصي وعلي استعداد لتقديم ما يثبت صحة هذه المعلومات من وثاثق او مستندات فور طلبها
                                        </q>
                                    </blockquote>
                                    
                                    <div class="log__box">
                                        <input type="checkbox" required id="commitment" required>
                                    <label for="commitment">أقر وأتعهد</label>
                                    </div>
                                </div>
                            </div>
            
                            <div class="log__row log__row--2">
                                <div class="log__col">
                                    <label for="id">الهوية</label>
                                    <input required type="number" pattern="[0-9]*" id="id">
                                </div>
            
                                <div class="log__col">
                                    <label for="licence">رقم الترخيص</label>
                                    <input required type="number" pattern="[0-9]*" licence="licence">
                                </div>
                            </div>
            
                            <div class="log__row log__row--1">
                                <input type="submit" value="الدفع والتسجيل">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
        </div>
        <!-- end signup -->
      </div>
    </div>

    <div class="container-fluid noPadding">

        <span class="slice"></span>
        <span class="slice"></span>
        <span class="slice"></span>
        <span class="slice"></span>
      </div>
    </div>

    <script src="../js/common.js"></script>
